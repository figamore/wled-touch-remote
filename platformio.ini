[env:esp32-cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 748800
; monitor_filters=esp32_exception_decoder


lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    lvgl/lvgl@^8.3.11

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -D CORE_DEBUG_LEVEL=1

board_build.partitions = huge_app.csv
extra_scripts =
    pre:scripts/embed_logo.py
    pre:scripts/git_version.py

[env:esp32-cyd-capacitive]
; Backward-compatible alias. The default esp32-cyd firmware now supports
; capacitive boards automatically and prompts for a tap on resistive boards.
extends = env:esp32-cyd

[env:esp32-cyd-capacitive-no-battery]
extends = env:esp32-cyd-capacitive
build_flags =
    ${env:esp32-cyd.build_flags}
    -D WLED_CYD_ENABLE_BATTERY=0

[env:esp32-cyd-resistive]
; Manual profile for hardware debugging; normal users should use esp32-cyd.
extends = env:esp32-cyd
build_flags =
    ${env:esp32-cyd.build_flags}
    -D CYD_HARDWARE_PROFILE=CYD_PROFILE_ILI9341_XPT2046
    -D CYD_BOARD_CAPACITIVE=0
    -D WLED_CYD_ENABLE_BATTERY=0

[env:esp32-cyd-resistive-st7789]
; Manual profile for ST7789 + XPT2046 resistive hardware debugging.
extends = env:esp32-cyd
build_flags =
    ${env:esp32-cyd.build_flags}
    -D CYD_HARDWARE_PROFILE=CYD_PROFILE_ST7789_XPT2046
    -D CYD_BOARD_CAPACITIVE=0
    -D WLED_CYD_ENABLE_BATTERY=0

[env:esp32-cyd-capacitive-ip5306-shutdown]
extends = env:esp32-cyd-capacitive
build_flags =
    ${env:esp32-cyd.build_flags}
    -D WLED_CYD_ENABLE_SHUTDOWN=1
    -D WLED_CYD_SHUTDOWN_GPIO=17
    -D WLED_CYD_SHUTDOWN_HOLD_MS=10200

[env:macos]
; MacOS simulator
; First, install sdl2 using: brew install sdl2
; Build: pio run -e macos
; Run: .pio/build/macos/program
platform = native
build_type = release

lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    lvgl/lvgl@^8.3.11

build_flags =
    -O0
    -std=c++17
    -lSDL2
    -D LV_CONF_INCLUDE_SIMPLE
    -D WLED_TOUCH_SIMULATOR=1
    -D LGFX_SDL
    -D WLED_CYD_ENABLE_BATTERY=1
    -I include/sim
    -I include
    -I"${sysenv.HOMEBREW_PREFIX}/include/SDL2"
    -L"${sysenv.HOMEBREW_PREFIX}/lib"
    -I"/usr/local/include/SDL2"
    -L"/usr/local/lib"
    -include sim/sdl_prelude.h

build_src_filter =
    +<*>
    -<BatteryMonitor.cpp>

extra_scripts =
    pre:scripts/embed_logo.py
    pre:scripts/git_version.py
